version: '3.8'

services:
  web:
    build: .
    container_name: pitm_college_web
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    environment:
      - DEBUG=True
    restart: always

volumes:
  static_volume:
  media_volume:
